{% extends 'base.html' %}
{% block title %}Forgot Password - LifeLink{% endblock %}

{% block content %}
<div style="max-width: 500px; margin: 4rem auto; background: var(--surface); padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
    <div style="text-align: center; margin-bottom: 2rem;">
        <i class="fas fa-lock" style="font-size: 3rem; color: var(--primary);"></i>
        <h2 style="margin-top: 1rem;">Reset Password</h2>
        <p style="color: #666;">Enter your registered mobile number to receive a temporary login password.</p>
    </div>

    <form method="POST" action="{{ url_for('forgot_password') }}">
        <div class="form-group" style="margin-bottom: 1.5rem;">
            <label style="display: block; margin-bottom: 0.5rem; font-weight: bold;">Mobile Number</label>
            <input type="text" name="mobile_number" class="form-control" required style="width: 100%; padding: 0.8rem; border: 1px solid var(--border-color); border-radius: 5px; background: var(--bg-color); color: var(--text);">
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; padding: 1rem; font-size: 1.1rem;"><i class="fas fa-key"></i> Get Temporary Password</button>
    </form>
    <div style="text-align: center; margin-top: 1.5rem;">
        <a href="{{ url_for('login') }}" style="color: var(--primary); text-decoration: none;">&larr; Back to Login</a>
    </div>
</div>
{% endblock %}
