{% extends 'base.html' %}

{% block content %}
<div class="login-bg-card">
    <div class="glass-panel hover-lift" style="transition-duration: 0.5s;">
        <div style="text-align: center; margin-bottom: 2rem;">
            <i class="fas fa-heartbeat" style="font-size: 3rem; color: var(--primary); margin-bottom: 1rem;"></i>
            <h2 style="color: white; font-size: 2rem; margin-bottom: 0.5rem; font-weight: 700;">Welcome Back</h2>
            <p style="color: #ddd;">Login to continue saving lives.</p>
        </div>

        {% if error %}
        <div style="background: rgba(255, 51, 102, 0.2); border-left: 4px solid var(--primary); color: #fff; padding: 12px; border-radius: 4px; margin-bottom: 20px; font-size: 0.95rem;">
            <i class="fas fa-exclamation-circle" style="margin-right: 8px;"></i> {{ error }}
        </div>
        {% endif %}

        <form method="POST">
            <div class="form-group" style="margin-bottom: 1.5rem;">
                <label style="color: #eee; font-weight: 500; font-size: 0.95rem;">Mobile Number</label>
                <div style="position: relative;">
                    <i class="fas fa-phone-alt" style="position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #aaa;"></i>
                    <input type="tel" name="mobile_number" required style="width: 100%; padding: 12px 12px 12px 45px; border-radius: 8px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; transition: all 0.3s; font-size: 1rem;">
                </div>
            </div>
            <div class="form-group" style="margin-bottom: 2.5rem;">
                <label style="color: #eee; font-weight: 500; font-size: 0.95rem;">Password</label>
                <div style="position: relative;">
                    <i class="fas fa-lock" style="position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #aaa;"></i>
                    <input type="password" name="password" id="password_input" required
                        style="width: 100%; padding: 12px 45px; border-radius: 8px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; transition: all 0.3s; font-size: 1rem;">
                    <i class="fas fa-eye" id="togglePassword"
                        style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #aaa; transition: color 0.3s;"
                        onmouseover="this.style.color='white'" onmouseout="this.style.color='#aaa'"
                        onclick="toggleVisibility('password_input', 'togglePassword')"></i>
                </div>
            </div>
            <button type="submit" class="btn btn-primary btn-glow" style="width: 100%; padding: 14px; font-size: 1.1rem; border-radius: 8px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px;">
                Secure Login <i class="fas fa-arrow-right" style="margin-left: 8px;"></i>
            </button>
            <p class="text-center" style="margin-top: 1.5rem; color: #ddd; font-size: 0.95rem;">
                New User? <a href="{{ url_for('register') }}" style="color: var(--primary); font-weight: 600; text-decoration: none;">Register Here</a>
            </p>
            <div style="margin-top: 2rem; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 1.5rem; text-align: center;">
                <a href="{{ url_for('admin_login') }}" style="font-size: 0.9rem; color: #aaa; text-decoration: none; transition: color 0.3s; display: inline-flex; align-items: center;" onmouseover="this.style.color='white'" onmouseout="this.style.color='#aaa'">
                    <i class="fas fa-user-shield" style="margin-right: 8px;"></i> Admin Access
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
