{% extends 'donor/base.html' %}
{% block donor_content %}
<div style="max-width: 500px; margin: 0 auto; background: var(--surface); padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
    <h2 style="margin-bottom: 1.5rem; text-align: center;"><i class="fas fa-key"></i> Security Settings</h2>
    
    <form method="POST" action="{{ url_for('change_password') }}">
        <div style="margin-bottom: 1.5rem;">
            <label style="display: block; margin-bottom: 0.5rem;">Current Password</label>
            <input type="password" name="current_password" required style="width: 100%; padding: 0.8rem; background: var(--bg-color); color: var(--text); border: 1px solid var(--border-color); border-radius: 4px;">
        </div>
        
        <div style="margin-bottom: 1.5rem;">
            <label style="display: block; margin-bottom: 0.5rem;">New Password</label>
            <input type="password" name="new_password" required minlength="6" style="width: 100%; padding: 0.8rem; background: var(--bg-color); color: var(--text); border: 1px solid var(--border-color); border-radius: 4px;">
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; padding: 1rem; font-size: 1.1rem; border: none; border-radius: 4px; background: var(--primary); color: white; font-weight: bold; cursor: pointer;"><i class="fas fa-sync-alt"></i> Update Password</button>
    </form>
</div>
{% endblock %}
