{% extends 'hospital/base.html' %}
{% block hospital_content %}
<div style="max-width: 600px; margin: auto; background: var(--surface); padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
    <h2 style="margin-bottom: 1.5rem; border-bottom: 2px solid var(--border-color); padding-bottom: 0.5rem;"><i class="fas fa-hospital"></i> Hospital Profile Settings</h2>
    
    <form method="POST" action="{{ url_for('hospital_profile') }}">
        <div style="margin-bottom: 1rem;">
            <label style="display: block; margin-bottom: 0.5rem; font-weight: bold;">Hospital Name</label>
            <input type="text" value="{{ current_user.name }}" disabled style="width: 100%; padding: 0.8rem; border: 1px solid var(--border-color); border-radius: 5px; background: #eee; cursor: not-allowed; box-sizing: border-box;">
        </div>
        
        <div style="margin-bottom: 1rem;">
            <label style="display: block; margin-bottom: 0.5rem; font-weight: bold;">Registered Email</label>
            <input type="text" value="{{ current_user.email }}" disabled style="width: 100%; padding: 0.8rem; border: 1px solid var(--border-color); border-radius: 5px; background: #eee; cursor: not-allowed; box-sizing: border-box;">
        </div>
        
        <div style="margin-bottom: 1rem;">
            <label style="display: block; margin-bottom: 0.5rem; font-weight: bold;">City / Region</label>
            <input type="text" name="city" value="{{ current_user.city }}" required style="width: 100%; padding: 0.8rem; border: 1px solid var(--border-color); border-radius: 5px; box-sizing: border-box;">
        </div>
        
        <div style="margin-bottom: 1.5rem;">
            <label style="display: block; margin-bottom: 0.5rem; font-weight: bold;">Full Address</label>
            <textarea name="address" required style="width: 100%; padding: 0.8rem; border: 1px solid var(--border-color); border-radius: 5px; box-sizing: border-box; min-height: 80px;">{{ current_user.address }}</textarea>
        </div>
        
        <h3 style="margin-top: 2rem; margin-bottom: 1rem; border-bottom: 1px solid var(--border-color); padding-bottom: 0.5rem;">Security</h3>
        
        <div style="margin-bottom: 2rem;">
            <label style="display: block; margin-bottom: 0.5rem; font-weight: bold;">New Password <span style="font-weight: normal; color: #666; font-size: 0.85em;">(Leave blank to keep current)</span></label>
            <input type="password" name="new_password" placeholder="Enter new password" style="width: 100%; padding: 0.8rem; border: 1px solid var(--border-color); border-radius: 5px; box-sizing: border-box;">
        </div>
        
        <button type="submit" class="btn" style="width: 100%; padding: 1rem; font-size: 1.1rem; background: var(--primary); color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;"><i class="fas fa-save"></i> Save Changes</button>
    </form>
</div>
{% endblock %}
